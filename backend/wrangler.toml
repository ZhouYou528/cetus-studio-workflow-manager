# Cloudflare Workers 配置。Phase 2 加上 D1 绑定后,本地 `wrangler dev`
# 会自动起一个 SQLite 镜像存在 .wrangler/state/v3/d1/ 下,部署时再切到云端。

name = "studio-workflow-manager-api"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# 本地开发时,Access 不生效拿不到邮箱 header。auth.ts 会回退到这个值。
# OWNER_EMAILS:逗号分隔。任何此名单中的邮箱首次登录时自动 role='owner',
# 其他邮箱默认 'assistant',需要 owner 在 /api/users/:email PATCH 升级。
[vars]
DEV_USER_EMAIL = "shirleyljychina@gmail.com"
OWNER_EMAILS = "shirleyljychina@gmail.com"

# D1 数据库绑定
# 本地:wrangler 会在 .wrangler/state/v3/d1/ 自动建一个 SQLite 文件,database_id 写啥都行
# 线上:Phase 8 部署前跑 `wrangler d1 create studio_db`,把它返回的真实 UUID 填到 database_id
[[d1_databases]]
binding = "DB"
database_name = "studio_db"
database_id = "local-placeholder"
