# Cloudflare Workers 配置。

name = "studio-workflow-manager-api"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# 全局变量(线上生效)。安全注意:
#   - DEV_USER_EMAIL 已**移出 wrangler.toml**,放在 .dev.vars(gitignored)中,只本地生效。
#     prod 没这个 var → auth.ts 拿不到 Access header 时返回 401,不会被人裸 URL 访问。
#   - OWNER_EMAILS 不是机密(只是允许 owner 角色的邮箱列表),留在这里没问题。
[vars]
OWNER_EMAILS = "shirleyljychina@gmail.com"

# D1 数据库绑定
# 本地:wrangler 在 .wrangler/state/v3/d1/ 自动建 SQLite,database_id 是占位符。
# 线上:部署前跑 `wrangler d1 create studio_db`,把返回的真 UUID 填到 database_id。
[[d1_databases]]
binding = "DB"
database_name = "studio_db"
database_id = "55240b34-7bc1-4fd9-bf12-30c0e4af8dc3"
